<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Dumbu: Ghost Delivery</title>
<style>
  :root{--ink:#0b0718;--paper:#f6ecff;--dim:#9a8cc4;--lantern:#ffab4a;--spirit:#8ef0e2;--coin:#ffd166;--danger:#ff8fa3;--card:#1c1233;--card2:#251a42;}
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{height:100%;background:var(--ink);overflow:hidden;font-family:"Arial Rounded MT Bold","Trebuchet MS",ui-rounded,system-ui,sans-serif;-webkit-user-select:none;user-select:none;touch-action:manipulation;color:var(--paper);}
  #wrap{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;}
  canvas#game{display:block;width:100%;height:100%;object-fit:contain;}
  .screen{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;background:rgba(11,7,24,.9);backdrop-filter:blur(4px);overflow-y:auto;padding:24px 16px 40px;z-index:5;}
  .hidden{display:none !important;}
  h1{font-size:clamp(38px,8vw,64px);color:var(--lantern);letter-spacing:2px;text-shadow:0 0 30px rgba(255,171,74,.55);margin-top:2vh;}
  .tag{color:var(--spirit);letter-spacing:6px;font-size:13px;margin-bottom:10px;}
  h2{font-size:24px;color:var(--lantern);}
  h3{align-self:flex-start;max-width:640px;width:100%;margin:22px auto 8px;color:var(--dim);font-size:12px;letter-spacing:3px;}
  header{display:flex;align-items:center;gap:14px;width:100%;max-width:640px;margin-bottom:6px;}
  .wallet{color:var(--coin);font-weight:bold;font-size:15px;letter-spacing:1px;}
  .note{color:var(--dim);font-size:11px;margin-top:14px;text-align:center;max-width:560px;}
  .rival{color:var(--dim);font-size:12px;margin:6px 0;text-align:center;}
  button{font-family:inherit;border:none;cursor:pointer;color:var(--paper);background:var(--card);border-radius:14px;padding:13px 22px;font-size:15px;font-weight:bold;letter-spacing:1px;transition:transform .08s,background .15s;}
  button:active{transform:scale(.95);}
  button.big{background:var(--lantern);color:var(--ink);font-size:20px;padding:16px 60px;border-radius:18px;box-shadow:0 0 26px rgba(255,171,74,.4);margin:12px 0 8px;}
  button.back{background:var(--card);width:44px;height:44px;padding:0;font-size:20px;border-radius:12px;}
  button.link{background:none;color:var(--spirit);padding:6px;font-size:14px;}
  .row{display:flex;gap:12px;}
  .rowwrap{display:flex;gap:10px;flex-wrap:wrap;width:100%;max-width:640px;margin:0 auto;}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px;width:100%;max-width:640px;margin-top:10px;}
  .card{background:var(--card);border-radius:16px;padding:12px 10px;text-align:center;cursor:pointer;border:2px solid transparent;transition:border .15s;}
  .card.equipped{border-color:var(--spirit);}
  .card.locked{opacity:.55;}
  .card h4{font-size:13px;margin:6px 0 2px;}
  .card .price{font-size:12px;color:var(--coin);}
  .card .state{font-size:11px;color:var(--spirit);letter-spacing:1px;}
  .card canvas{width:84px;height:78px;}
  .badge{color:var(--coin);font-size:10px;letter-spacing:1px;margin:2px 0;text-shadow:0 0 8px rgba(255,209,102,.6);}
  .pill{background:var(--card);border-radius:14px;padding:12px 18px;font-size:13px;border:2px solid transparent;}
  .pill.on{border-color:var(--spirit);color:var(--spirit);}
  .pill.locked{opacity:.5;}
  .pill small{display:block;color:var(--dim);font-weight:normal;font-size:10px;margin-top:3px;}
  .swatch{display:inline-block;width:34px;height:20px;border-radius:6px;vertical-align:middle;margin-right:8px;}
  input.city{font-family:inherit;background:var(--card);border:2px solid var(--spirit);border-radius:12px;color:var(--paper);padding:12px 16px;font-size:15px;text-align:center;width:260px;margin:6px;}
  #overBtns{position:fixed;left:0;right:0;bottom:8%;display:flex;gap:14px;justify-content:center;z-index:6;}
  #overBtns button{background:var(--card2);}
  #overBtns #againBtn{background:var(--lantern);color:var(--ink);}
</style>
</head>
<body>
<div id="wrap"><canvas id="game"></canvas></div>

<section id="home" class="screen">
  <h1>DUMBU</h1><div class="tag">GHOST DELIVERY</div>
  <canvas id="mascot" width="150" height="140"></canvas>
  <div class="wallet" id="walletH" style="margin:8px 0 2px">★ 0 · BEST 0</div>
  <button class="link" id="cityBtn">📍 Set your city</button>
  <div class="rival" id="rivalLine"></div>
  <input class="city hidden" id="cityInput" placeholder="type your city, then Enter" maxlength="22">
  <button class="big" id="playBtn">▶ PLAY</button>
  <div class="row">
    <button id="shopBtn">🛍 SKIN SHOP</button>
    <button id="setBtn">⚙ SETTINGS</button>
  </div>
  <p class="note">tap / space — jump &amp; double jump · swipe down / ↓ — slide</p>
</section>

<section id="shop" class="screen hidden">
  <header><button class="back" data-back>←</button><h2>Skin Shop</h2>
    <div class="wallet" style="margin-left:auto">★ <span id="walletS">0</span></div></header>
  <p class="note" style="margin:0">earn ★ by running — original cute-creepy designs</p>
  <div id="skinGrid" class="grid"></div>
</section>

<section id="settings" class="screen hidden">
  <header><button class="back" data-back>←</button><h2>Settings</h2></header>
  <h3>ENVIRONMENT</h3><div id="envRow" class="rowwrap"></div>
  <h3>DIFFICULTY</h3><div id="diffRow" class="rowwrap"></div>
  <h3>SOUND</h3><div class="rowwrap"><button class="pill" id="sfxBtn"></button><button class="pill" id="musicBtn"></button></div>
</section>

<div id="overBtns" class="hidden"><button id="againBtn">RUN AGAIN</button><button id="homeBtn">HOME</button></div>

<script>
"use strict";
const $=id=>document.getElementById(id);
const W=880,H=480;
const cv=$("game"),cx=cv.getContext("2d");
cv.width=W;cv.height=H;
const GROUND=H-78;
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
const lerp=(a,b,t)=>a+(b-a)*t;
const rnd=(a,b)=>a+Math.random()*(b-a);

const SOULS=[
  {name:"Kind Soul",color:"#8ef0e2",desc:"no bonus — just precious cargo",key:"kind"},
  {name:"Brave Soul",color:"#ff8fa3",desc:"absorbs one hit",key:"brave"},
  {name:"Lucky Soul",color:"#ffd166",desc:"coins are worth double",key:"lucky"},
  {name:"Swift Soul",color:"#b59df7",desc:"the world runs 12% slower",key:"swift"},
];
const SKINS=[
  {id:"classic",name:"Classic",price:0,body:"#8a6ff0",belly:"#b9a5ff",ear:"#e8b7ff"},
  {id:"snaggle",name:"Snaggle",price:250,body:"#f0e0c8",belly:"#fff6e6",ear:"#f7c8d8",teeth:true},
  {id:"mocha",name:"Mocha",price:250,body:"#a5714f",belly:"#e0b990",ear:"#f0cdb0",teeth:true},
  {id:"bubble",name:"Bubblegum",price:500,body:"#ff9fc7",belly:"#ffd9ea",ear:"#fff0f7"},
  {id:"frosty",name:"Frosty",price:500,body:"#9fd8f0",belly:"#e2f7ff",ear:"#c9ecff",teeth:true},
  {id:"minty",name:"Minty",price:1000,body:"#7ddba8",belly:"#c9f5dd",ear:"#eafff3",teeth:true},
  {id:"sunny",name:"Sunny",price:1000,body:"#ffc65c",belly:"#ffe7b0",ear:"#fff4d8"},
  {id:"midnight",name:"Midnight",price:2000,body:"#3a3350",belly:"#5a5178",ear:"#8ef0e2",teeth:true,glow:"#8ef0e2"},
  {id:"fog",name:"Lavender Fog",price:2000,body:"#b8aed4",belly:"#ddd6ee",ear:"#f3effc",ghostly:true},
  {id:"ember",name:"Ember",price:5000,body:"#c74b32",belly:"#f0925f",ear:"#ffc98f",teeth:true,glow:"#ffab4a"},
  {id:"toxic",name:"Toxic",price:5000,body:"#4c7a3d",belly:"#8fce6b",ear:"#d2ff9e",teeth:true,glow:"#a6ff4d"},
  {id:"sakura",name:"Sakura",price:8000,body:"#ffe3ec",belly:"#fff6fa",ear:"#ff9fc7",trail:"#ffb7d5"},
  {id:"storm",name:"Storm",price:8000,body:"#5a6b8c",belly:"#8fa3c7",ear:"#ffe08a",teeth:true,glow:"#ffe08a"},
  {id:"devil",name:"Lil Devil",price:12000,body:"#e0484f",belly:"#ff8a8f",ear:"#ffc2c4",teeth:true,horns:true},
  {id:"yeti",name:"Yeti",price:12000,body:"#e8f2fa",belly:"#ffffff",ear:"#bcd9ee",teeth:true},
  {id:"galaxy",name:"Galaxy",price:20000,body:"#2e2a6e",belly:"#5a51b8",ear:"#c9a2ff",glow:"#c9a2ff",trail:"#8f7dff"},
  {id:"gilded",name:"Gilded",price:20000,body:"#d9a52e",belly:"#f5d67a",ear:"#fff0c2",teeth:true,trail:"#ffd166"},
  {id:"phantom",name:"Phantom",price:35000,body:"#dfe6ff",belly:"#ffffff",ear:"#b9c6ff",ghostly:true,glow:"#ffffff",trail:"#dfe6ff"},
  {id:"void",name:"Void",price:35000,body:"#17131f",belly:"#2c2340",ear:"#ff4dd2",teeth:true,glow:"#ff4dd2",trail:"#ff4dd2"},
  {id:"king",name:"Ghost King Jr.",price:50000,body:"#7a5cff",belly:"#b39dff",ear:"#ffd166",teeth:true,glow:"#ffd166",trail:"#ffd166",crown:true,god:true},
];
const ENVS=[
  {id:"road",name:"Ghost Road",unlock:0,top:[0x16,0x10,0x2e],bot:[0x2d,0x1b,0x52],ground:"#0b0718",trees:7,graves:false},
  {id:"forest",name:"Haunted Forest",unlock:1000,top:[0x08,0x1c,0x14],bot:[0x11,0x38,0x26],ground:"#03110a",trees:13,graves:false},
  {id:"cemetery",name:"Old Cemetery",unlock:2500,top:[0x18,0x17,0x22],bot:[0x3a,0x35,0x4a],ground:"#121019",trees:3,graves:true},
];
const DIFFS=[
  {id:"easy",name:"Easy",ramp:620,spawnSub:24,escape:300,bossEvery:1500,coinMult:1,sub:"gentle · 5s catch"},
  {id:"normal",name:"Normal",ramp:450,spawnSub:34,escape:240,bossEvery:1000,coinMult:1,sub:"the real night shift"},
  {id:"nightmare",name:"Nightmare",ramp:300,spawnSub:44,escape:180,bossEvery:750,coinMult:2,sub:"brutal · 2× coins"},
];
const RIVAL_NAMES=["Wisp","Boo","Shade","Flicker","Hollow","Murk","Gloom","Haze"];

const P={coins:0,best:0,owned:{classic:true},skin:"classic",env:"road",diff:"normal",sfx:true,music:false,
  city:"",rivalScore:500,rivalName:"Wisp"};
const curSkin=()=>SKINS.find(s=>s.id===P.skin);
const curEnv=()=>ENVS.find(e=>e.id===P.env);
const curDiff=()=>DIFFS.find(d=>d.id===P.diff);
function nextRival(base){return base+Math.floor(Math.max(150,base*rnd(0.08,0.18)));}
function setCity(name){P.city=name.trim();if(P.rivalScore<P.best)P.rivalScore=nextRival(P.best);}

// ---- audio ----
let AC=null;
function ac(){if(!AC){try{AC=new(window.AudioContext||window.webkitAudioContext)();}catch(e){}}return AC;}
function tone(f,d,type,v,slide){if(!P.sfx)return;const a=ac();if(!a)return;try{const o=a.createOscillator(),g=a.createGain();o.type=type||"sine";o.frequency.setValueAtTime(f,a.currentTime);if(slide)o.frequency.exponentialRampToValueAtTime(Math.max(30,f+slide),a.currentTime+d);g.gain.setValueAtTime(v||.12,a.currentTime);g.gain.exponentialRampToValueAtTime(.001,a.currentTime+d);o.connect(g).connect(a.destination);o.start();o.stop(a.currentTime+d);}catch(e){}}
const SFX={jump:()=>tone(300,.15,"square",.07,220),coin:()=>tone(950,.09,"sine",.09,180),hit:()=>tone(120,.28,"sawtooth",.16,-70),
  catch:()=>{tone(520,.1,"sine",.12);setTimeout(()=>tone(660,.1,"sine",.12),90);setTimeout(()=>tone(880,.16,"sine",.12),180);},
  deliver:()=>{tone(660,.1,"triangle",.12);setTimeout(()=>tone(990,.18,"triangle",.12),110);},
  boss:()=>tone(70,.7,"sawtooth",.16,-25),over:()=>{tone(330,.22,"triangle",.14,-140);setTimeout(()=>tone(220,.35,"triangle",.14,-100),200);},click:()=>tone(600,.05,"square",.05)};
const NT={A2:110,C3:130.8,D3:146.8,E3:164.8,F3:174.6,G3:196,A3:220,C4:261.6,E4:329.6,F4:349.2,G4:392,A4:440,B4:493.9,C5:523.3,E5:659.3};
function mnote(f,t,dur,type,vol){const a=ac();if(!a)return;try{const o=a.createOscillator(),g=a.createGain();o.type=type;o.frequency.value=f;const st=a.currentTime+t;g.gain.setValueAtTime(0,st);g.gain.linearRampToValueAtTime(vol,st+0.03);g.gain.exponentialRampToValueAtTime(0.001,st+dur);o.connect(g).connect(a.destination);o.start(st);o.stop(st+dur+0.05);}catch(e){}}
const MBARS=[{b:NT.A2,m:[[NT.A4,0,.4],[NT.C5,.5,.4],[NT.E5,1,.5],[NT.C5,1.5,.4]]},{b:NT.F3,m:[[NT.A4,0,.4],[NT.G4,.5,.4],[NT.F4,1,.6],[NT.A4,1.5,.4]]},{b:NT.C3,m:[[NT.G4,0,.4],[NT.E4,.5,.4],[NT.G4,1,.5],[NT.C5,1.5,.4]]},{b:NT.E3,m:[[NT.E4,0,.4],[NT.F4,.5,.4],[NT.E4,1,.4],[NT.B4,1.5,.6]]}];
const CHORDS=[[NT.A3,NT.C4,NT.E4],[NT.F3,NT.A3,NT.C4],[NT.C3,NT.E3,NT.G3],[NT.E3,NT.G3,NT.B4]];
const BAR=2.0;let mbar=0;
function scheduleBar(){if(!P.music){setTimeout(scheduleBar,300);return;}ac();const b=MBARS[mbar%4],ch=CHORDS[mbar%4];mnote(b.b,0,.9,"triangle",.16);mnote(b.b,BAR/2,.9,"triangle",.16);for(const c of ch)mnote(c,0,BAR*0.95,"sine",.035);for(const m of b.m)mnote(m[0],m[1],m[2],"square",.05);mbar++;setTimeout(scheduleBar,BAR*1000);}
scheduleBar();

// ---- run state ----
let S;
function newRunState(mode){
  const E=curEnv();
  S={mode,t:0,dist:0,speed:4.0,score:0,banked:0,coins:0,deliveries:0,combo:0,
    player:{x:150,y:GROUND,vy:0,slide:0,jumps:0,anim:0},soul:SOULS[0],shield:false,
    obstacles:[],coinsArr:[],parts:[],puffs:[],spawnT:60,nextGate:400,
    nextBoss:Math.round(curDiff().bossEvery*0.9),boss:null,escape:null,escapeMax:curDiff().escape,
    banner:null,overReason:"",shake:0,envDef:E,
    hint:null,shownJump:false,shownSlide:false,beatRival:false,
    trees:makeTrees(E.trees),stones:makeStones(),bgGraves:E.graves?makeBgGraves():[]};
}
function makeTrees(n){const a=[];for(let i=0;i<n;i++)a.push({x:i*(W/n)+rnd(-30,30),s:rnd(.7,1.25),f:Math.random()>.5});return a;}
function makeStones(){const a=[];for(let i=0;i<10;i++)a.push({x:i*110+rnd(-20,20),s:rnd(.5,1)});return a;}
function makeBgGraves(){const a=[];for(let i=0;i<6;i++)a.push({x:i*170+rnd(-30,30),s:rnd(.8,1.5)});return a;}
newRunState("menu");

// ---- input ----
function inGame(){return $("home").classList.contains("hidden")&&$("shop").classList.contains("hidden")&&$("settings").classList.contains("hidden");}
function jump(){if(!inGame())return;if(S.mode==="over"){if(S.t>30)startRun();return;}if(S.mode!=="run"&&S.mode!=="escape")return;const p=S.player;if(p.slide>0){p.slide=0;return;}if(p.jumps<2){p.vy=p.jumps===0?-13.2:-11.4;p.jumps++;puff(p.x,p.y);SFX.jump();}}
function slide(){if(!inGame())return;if(S.mode!=="run"&&S.mode!=="escape")return;const p=S.player;if(p.jumps>0&&p.vy<0&&p.y>GROUND-72){p.y=GROUND;p.vy=0;p.jumps=0;}if(p.y>=GROUND-1){p.slide=34;}else{p.vy=Math.max(p.vy,14);}}
addEventListener("keydown",e=>{if(e.repeat)return;if(e.code==="Space"||e.code==="ArrowUp"){if(inGame())e.preventDefault();jump();}if(e.code==="ArrowDown"){if(inGame())e.preventDefault();slide();}});
let touchY=null,touchStartT=0,touchActive=false,slidHandled=false,maxDown=0;const SWIPE_PX=18;
cv.addEventListener("touchstart",e=>{e.preventDefault();touchY=e.touches[0].clientY;touchStartT=performance.now();touchActive=true;slidHandled=false;maxDown=0;jump();},{passive:false});
cv.addEventListener("touchmove",e=>{if(!touchActive)return;const dy=e.touches[0].clientY-touchY;if(dy>maxDown)maxDown=dy;if(!slidHandled&&dy>SWIPE_PX){slidHandled=true;slide();}},{passive:true});
cv.addEventListener("touchend",e=>{e.preventDefault();if(touchActive&&!slidHandled){const dy=e.changedTouches[0].clientY-touchY;const peak=Math.max(dy,maxDown);const quick=performance.now()-touchStartT<250;if(peak>SWIPE_PX||(quick&&peak>10))slide();}touchActive=false;},{passive:false});
cv.addEventListener("mousedown",()=>{if(!("ontouchstart"in window))jump();});

// ---- helpers ----
function banner(text,sub,color){S.banner={text,sub,timer:120,color:color||"#fff"};}
function hint(text){S.hint={text,timer:130};}
function puff(x,y){for(let i=0;i<6;i++)S.puffs.push({x:x+rnd(-8,8),y:y+rnd(-4,4),vx:rnd(-1,-.2),vy:rnd(-.8,.2),r:rnd(3,7),a:1});}
function sparks(x,y,c,n=14){for(let i=0;i<n;i++)S.parts.push({x,y,vx:rnd(-3,3),vy:rnd(-4,1),r:rnd(2,4),a:1,c});}

// ---- fair spawner ----
function spawnGroup(){
  let group=1;
  if(S.dist>400&&Math.random()<0.30)group=2;
  const jumpGap=230+S.speed*14;
  let x=W+60,prev="";
  for(let i=0;i<group;i++){prev=spawnOne(x,prev);x+=jumpGap+rnd(0,60);}
  if(Math.random()<0.5){const cy=GROUND-rnd(70,150),cxs=W+60+rnd(120,220);for(let i=0;i<5;i++)S.coinsArr.push({x:cxs+i*30,y:cy-Math.sin(i/4*Math.PI)*26,r:10});}
}
function spawnOne(x,prev){
  const d=S.dist,r=Math.random();let chosen="";
  if(d>800&&r<0.10)chosen="wolf";
  else if(d>1100&&r<0.22)chosen="swoop";
  else if(r<0.44)chosen="grave";
  else if(r<0.62)chosen="pumpkin";
  else if(r<0.82)chosen="ghost";
  else chosen="ghostHi";
  if(chosen==="wolf"&&prev==="wolf")chosen="grave";
  const pj=["grave","pumpkin","wolf"].includes(prev),pd=["ghost","ghostHi"].includes(prev);
  const tj=["grave","pumpkin","wolf"].includes(chosen),td=["ghost","ghostHi"].includes(chosen);
  if((pj&&td)||(pd&&tj))chosen=pj?"pumpkin":"ghost";
  if(chosen==="swoop"&&pj)chosen="ghostHi";
  appendObstacle(chosen,x);
  const isJ=["grave","pumpkin","wolf"].includes(chosen),isD=["ghost","ghostHi"].includes(chosen);
  if(!S.shownJump&&isJ){S.shownJump=true;hint("TAP / SPACE to JUMP");}
  else if(!S.shownSlide&&isD){S.shownSlide=true;hint("SWIPE DOWN / ↓ to SLIDE");}
  return chosen;
}
function appendObstacle(type,x){
  if(type==="wolf")S.obstacles.push({type,x,y:GROUND,w:52,h:34,vx:1.35});
  else if(type==="swoop")S.obstacles.push({type,x,y:GROUND-190,w:42,h:36,dive:true,bob:rnd(0,6)});
  else if(type==="grave")S.obstacles.push({type,x,y:GROUND,w:42,h:52});
  else if(type==="pumpkin")S.obstacles.push({type,x,y:GROUND,w:36,h:30});
  else if(type==="ghost")S.obstacles.push({type,x,y:GROUND-58,w:44,h:38,bob:rnd(0,6)});
  else S.obstacles.push({type:"ghostHi",x,y:GROUND-118,w:44,h:38,bob:rnd(0,6)});
}

// ---- update ----
function update(){
  S.t++;
  if(S.mode==="menu"||S.mode==="over"){ambient();return;}
  const D=curDiff();
  const swift=S.soul.key==="swift"?0.88:1;
  const spd=S.speed*swift;
  const p=S.player;
  S.dist+=spd*0.14;S.score=Math.floor(S.dist)+S.banked;
  S.speed=(4.0+Math.min(5.0,S.dist/(D.ramp*1.6)))*(S.boss?1.08:1);
  for(const t of S.trees){t.x-=spd*0.35;if(t.x<-80)t.x=W+rnd(0,60);}
  for(const st of S.stones){st.x-=spd*0.6;if(st.x<-40)st.x=W+rnd(0,40);}
  for(const bg of S.bgGraves){bg.x-=spd*0.35;if(bg.x<-60)bg.x=W+rnd(0,80);}
  p.anim+=spd*0.05;p.vy+=0.62;p.y+=p.vy;
  if(p.y>=GROUND){p.y=GROUND;p.vy=0;p.jumps=0;}
  if(p.slide>0)p.slide--;
  if(S.mode==="run"){S.spawnT--;if(S.spawnT<=0){spawnGroup();const mg=62-Math.min(D.spawnSub*0.6,S.dist/120);S.spawnT=Math.max(38,mg+rnd(0,22))*(S.boss?0.85:1);}}
  // gate

function startEscape(){const p=S.player;S.mode="escape";S.shake=14;S.combo=0;SFX.hit();S.escape={x:p.x+40,y:p.y-110,tx:0,ty:0,timer:S.escapeMax,bob:rnd(0,6),grace:25};banner("THE SOUL ESCAPED!","catch it — but don't trip on anything!",S.soul.color);sparks(p.x,p.y-30,S.soul.color,18);}

  // rival chase
  if(P.city&&(S.mode==="run"||S.mode==="escape")){cx.textAlign="center";cx.fillStyle="#9a8cc4";cx.font="11px sans-serif";const gap=P.rivalScore-S.score;cx.fillText(gap>0?("chasing "+P.rivalName+": "+P.rivalScore.toLocaleString()+"  ("+gap+" to go)"):("★ leading "+P.city+"!"),W/2,H-14);cx.textAlign="left";}
  if(S.boss){cx.fillStyle="rgba(201,162,255,0.2)";cx.fillRect(W/2-130,H-24,260,10);cx.fillStyle="#c9a2ff";cx.fillRect(W/2-130,H-24,260*(1-S.boss.timer/600),10);cx.fillStyle="#c9a2ff";cx.font="bold 10px sans-serif";cx.textAlign="center";cx.fillText("OUTRUN THE GHOST KING",W/2,H-30);cx.textAlign="left";}
  const prog=1-((S.nextGate-S.dist)/400);cx.fillStyle="rgba(255,255,255,0.12)";cx.fillRect(W/2-110,18,220,8);cx.fillStyle="#8ef0e2";cx.fillRect(W/2-110,18,220*clamp(prog,0,1),8);cx.fillStyle="#9a8cc4";cx.font="10px sans-serif";cx.textAlign="center";cx.fillText("NEXT DROP-OFF",W/2,40);
  // hint
  if(S.hint){const a=Math.min(1,S.hint.timer/20)*(0.7+0.3*Math.sin(S.t*0.5));cx.globalAlpha=a;cx.fillStyle="#ffab4a";cx.font="bold 30px sans-serif";cx.textAlign="center";cx.strokeStyle="#0b0718";cx.lineWidth=6;cx.strokeText(S.hint.text,W/2,H*0.6);cx.fillText(S.hint.text,W/2,H*0.6);cx.globalAlpha=1;}
  // banner
  if(S.banner){const b=S.banner,a=Math.min(1,b.timer/20);cx.globalAlpha=a;cx.textAlign="center";cx.fillStyle=b.color;cx.font="bold 26px sans-serif";cx.fillText(b.text,W/2,120);cx.fillStyle="#f6ecff";cx.font="13px sans-serif";cx.fillText(b.sub,W/2,144);cx.globalAlpha=1;}
  if(S.mode==="over"){cx.fillStyle="rgba(11,7,24,0.72)";cx.fillRect(0,0,W,H);cx.textAlign="center";cx.fillStyle="#ff8fa3";cx.font="bold 32px sans-serif";cx.fillText(S.overReason,W/2,150);cx.fillStyle="#f6ecff";cx.font="17px sans-serif";cx.fillText("Score "+S.score.toLocaleString()+"   Deliveries "+S.deliveries+"   ★ "+S.coins,W/2,192);cx.fillStyle="#ffd166";cx.font="bold 14px sans-serif";cx.fillText("Best "+P.best.toLocaleString()+"   Wallet ★ "+P.coins.toLocaleString(),W/2,218);
    const where=P.city||"your city";cx.font="14px sans-serif";if(S.beatRival){cx.fillStyle="#8ef0e2";cx.fillText("🏆 You beat "+where+"! New rival "+P.rivalName+" runs "+P.rivalScore.toLocaleString(),W/2,248);}else{cx.fillStyle="#c9a2ff";cx.fillText(P.rivalName+" of "+where+" leads "+P.rivalScore.toLocaleString()+" — "+Math.max(0,P.rivalScore-S.score)+" to go",W/2,248);}}
  cx.textAlign="left";}
function panel(x,y,w,h){cx.fillStyle="rgba(11,7,24,0.55)";cx.beginPath();cx.roundRect(x,y,w,h,12);cx.fill();}

// ---- mini portrait ----
function drawMini(g,sk,w,h){g.clearRect(0,0,w,h);g.save();g.translate(w/2,h*0.62);const s=Math.min(w,h)/140;g.scale(s,s);if(sk.ghostly)g.globalAlpha=0.72;
  g.fillStyle=sk.body;g.beginPath();g.ellipse(-26,-58,10,26,-0.28,0,7);g.fill();g.beginPath();g.ellipse(26,-58,10,26,0.28,0,7);g.fill();g.fillStyle=sk.ear;g.beginPath();g.ellipse(-26,-54,5,15,-0.28,0,7);g.fill();g.beginPath();g.ellipse(26,-54,5,15,0.28,0,7);g.fill();
  if(sk.horns){g.fillStyle="#3a1114";g.beginPath();g.moveTo(-30,-52);g.quadraticCurveTo(-44,-78,-24,-84);g.quadraticCurveTo(-24,-64,-16,-56);g.closePath();g.fill();g.beginPath();g.moveTo(30,-52);g.quadraticCurveTo(44,-78,24,-84);g.quadraticCurveTo(24,-64,16,-56);g.closePath();g.fill();}
  if(sk.glow){g.shadowColor=sk.glow;g.shadowBlur=18;}g.fillStyle=sk.body;g.beginPath();g.ellipse(0,-10,42,44,0,0,7);g.fill();g.shadowBlur=0;g.fillStyle=sk.belly;g.beginPath();g.ellipse(0,8,25,22,0,0,7);g.fill();
  if(sk.crown){g.fillStyle="#ffd166";g.shadowColor="#ffd166";g.shadowBlur=12;g.beginPath();g.moveTo(-26,-50);g.lineTo(-26,-72);g.lineTo(-13,-60);g.lineTo(0,-80);g.lineTo(13,-60);g.lineTo(26,-72);g.lineTo(26,-50);g.closePath();g.fill();g.shadowBlur=0;}
  g.fillStyle="#fff";if(sk.glow){g.shadowColor=sk.glow;g.shadowBlur=12;}g.beginPath();g.arc(-14,-22,8,0,7);g.arc(14,-22,8,0,7);g.fill();g.shadowBlur=0;g.fillStyle="#0b0718";g.beginPath();g.arc(-13,-22,4,0,7);g.arc(15,-22,4,0,7);g.fill();
  if(sk.teeth){g.fillStyle="#fff";g.strokeStyle="#0b0718";g.lineWidth=2;g.beginPath();g.moveTo(-15,-6);for(let i=0;i<6;i++){g.lineTo(-15+i*5+2.5,0);g.lineTo(-15+(i+1)*5,-6);}g.closePath();g.fill();g.stroke();}else{g.strokeStyle="#0b0718";g.lineWidth=2.5;g.beginPath();g.arc(0,-6,7,0.15*Math.PI,0.85*Math.PI);g.stroke();}g.restore();}

// ---- UI ----
function show(name){for(const s of["home","shop","settings"])$(s).classList.toggle("hidden",s!==name);$("overBtns").classList.add("hidden");refreshUI();}
function refreshUI(){
  $("walletH").textContent="★ "+P.coins.toLocaleString()+" · BEST "+P.best.toLocaleString();
  $("walletS").textContent=P.coins.toLocaleString();
  drawMini($("mascot").getContext("2d"),curSkin(),150,140);
  if(P.city===""){$("cityBtn").textContent="📍 Set your city";$("rivalLine").textContent="set your city to join the local Ghost Riders board";}
  else{$("cityBtn").textContent="📍 "+P.city;$("rivalLine").textContent=P.city+" Ghost Riders — top runner "+P.rivalName+": "+P.rivalScore.toLocaleString();}
  renderShop();renderEnvs();renderDiffs();renderSound();
}
function renderShop(){const grid=$("skinGrid");grid.innerHTML="";for(const sk of SKINS){const owned=!!P.owned[sk.id],equipped=P.skin===sk.id;const card=document.createElement("div");card.className="card"+(equipped?" equipped":"");const c=document.createElement("canvas");c.width=100;c.height=92;card.appendChild(c);const h=document.createElement("h4");h.textContent=sk.name;card.appendChild(h);if(sk.god){const bd=document.createElement("div");bd.className="badge";bd.textContent="⚡ GOD MODE";card.appendChild(bd);}const pr=document.createElement("div");if(equipped){pr.className="state";pr.textContent="EQUIPPED";}else if(owned){pr.className="state";pr.textContent="TAP TO EQUIP";}else{pr.className="price";pr.textContent="★ "+sk.price;}card.appendChild(pr);card.onclick=()=>{SFX.click();if(owned){P.skin=sk.id;}else if(P.coins>=sk.price){P.coins-=sk.price;P.owned[sk.id]=true;P.skin=sk.id;SFX.deliver();}else{card.animate([{transform:"translateX(0)"},{transform:"translateX(-6px)"},{transform:"translateX(6px)"},{transform:"translateX(0)"}],{duration:220});return;}refreshUI();};grid.appendChild(card);drawMini(c.getContext("2d"),sk,100,92);}}
function renderEnvs(){const row=$("envRow");row.innerHTML="";for(const e of ENVS){const locked=P.best<e.unlock;const b=document.createElement("button");b.className="pill"+(P.env===e.id?" on":"")+(locked?" locked":"");b.innerHTML=`<span class="swatch" style="background:linear-gradient(rgb(${e.top}),rgb(${e.bot}))"></span>`+e.name+(locked?`<small>🔒 reach ${e.unlock.toLocaleString()} pts</small>`:"<small>&nbsp;</small>");b.onclick=()=>{SFX.click();if(!locked){P.env=e.id;refreshUI();}};row.appendChild(b);}}
function renderDiffs(){const row=$("diffRow");row.innerHTML="";for(const d of DIFFS){const b=document.createElement("button");b.className="pill"+(P.diff===d.id?" on":"");b.innerHTML=d.name+`<small>${d.sub}</small>`;b.onclick=()=>{SFX.click();P.diff=d.id;refreshUI();};row.appendChild(b);}}
function renderSound(){$("sfxBtn").className="pill"+(P.sfx?" on":"");$("sfxBtn").innerHTML=(P.sfx?"🔊":"🔇")+" Sound FX<small>"+(P.sfx?"on":"off")+"</small>";$("musicBtn").className="pill"+(P.music?" on":"");$("musicBtn").innerHTML="🎵 Music<small>"+(P.music?"on":"off")+"</small>";}
$("sfxBtn").onclick=()=>{P.sfx=!P.sfx;ac();SFX.click();renderSound();};
$("musicBtn").onclick=()=>{P.music=!P.music;ac();SFX.click();renderSound();};
$("playBtn").onclick=()=>{ac();SFX.click();startRun();};
$("shopBtn").onclick=()=>{ac();SFX.click();show("shop");};
$("setBtn").onclick=()=>{ac();SFX.click();show("settings");};
$("againBtn").onclick=()=>{SFX.click();startRun();};
$("homeBtn").onclick=()=>{SFX.click();newRunState("menu");show("home");};
for(const b of document.querySelectorAll("[data-back]"))b.onclick=()=>{SFX.click();show("home");};
$("cityBtn").onclick=()=>{SFX.click();const inp=$("cityInput");inp.classList.remove("hidden");inp.value=P.city;inp.focus();};
$("cityInput").addEventListener("keydown",e=>{if(e.key==="Enter"){if(e.target.value.trim()){setCity(e.target.value);SFX.deliver();}e.target.classList.add("hidden");refreshUI();}});
// dev: tap wallet 5x for coins
let _tap=0,_tt=null;$("walletH").addEventListener("click",()=>{_tap++;clearTimeout(_tt);_tt=setTimeout(()=>_tap=0,1200);if(_tap>=5){_tap=0;P.coins+=60000;SFX.deliver();refreshUI();}});

function startRun(){newRunState("run");show(null);for(const s of["home","shop","settings"])$(s).classList.add("hidden");if(curSkin().god)banner("⚡ GOD MODE","smash everything — but wolves & the king still bite!","#ffd166");else banner("NIGHT SHIFT BEGINS","deliver the "+S.soul.name.toLowerCase()+" before sunrise",S.soul.color);}

refreshUI();show("home");
(function loop(){update();draw();requestAnimationFrame(loop);})();
</script>
</body>
